name: Build Maximus Admin Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "maximus-admin/**"
      - ".github/workflows/build-windows-hostinger.yml"

permissions:
  contents: read

env:
  APP_DIR: maximus-admin
  HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
  HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
  HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
  HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
  HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
  WINDOWS_RELEASE_URL: ${{ secrets.WINDOWS_RELEASE_URL }}

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: maximus-admin/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Build Windows installer
        working-directory: ${{ env.APP_DIR }}
        run: npm run electron:dist:win

      - name: Prepare release files
        shell: pwsh
        working-directory: ${{ env.APP_DIR }}
        run: |
          $ErrorActionPreference = "Stop"

          $releaseDir = Join-Path (Get-Location) "release"
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "windows-release"
          New-Item -ItemType Directory -Force -Path $publishDir | Out-Null

          if (-not (Test-Path $releaseDir)) {
            throw "Pasta de release não encontrada: $releaseDir"
          }

          Copy-Item -Path (Join-Path $releaseDir "*.exe") -Destination $publishDir -Force -ErrorAction SilentlyContinue
          Copy-Item -Path (Join-Path $releaseDir "*.yml") -Destination $publishDir -Force -ErrorAction SilentlyContinue
          Copy-Item -Path (Join-Path $releaseDir "*.blockmap") -Destination $publishDir -Force -ErrorAction SilentlyContinue

          $installer = Get-ChildItem $publishDir -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "Nenhum instalador .exe foi gerado em maximus-admin/release."
          }

          $pkg = Get-Content "package.json" | ConvertFrom-Json
          $baseUrl = $env:WINDOWS_RELEASE_URL

          if ([string]::IsNullOrWhiteSpace($baseUrl)) {
            $baseUrl = "https://SEU_DOMINIO.com.br/maximus/windows/"
          }

          if (-not $baseUrl.EndsWith("/")) {
            $baseUrl = "$baseUrl/"
          }

          $versionJson = [ordered]@{
            name = "Maximus Admin"
            version = $pkg.version
            installer = $installer.Name
            installerUrl = "$baseUrl$($installer.Name)"
            commit = $env:GITHUB_SHA
            builtAt = (Get-Date).ToUniversalTime().ToString("o")
          } | ConvertTo-Json -Depth 5

          Set-Content -Path (Join-Path $publishDir "version.json") -Value $versionJson -Encoding UTF8

          $installScript = @"
          `$ErrorActionPreference = "Stop"

          `$releaseBaseUrl = "$baseUrl"

          if (-not `$releaseBaseUrl.EndsWith("/")) {
            `$releaseBaseUrl = "`$releaseBaseUrl/"
          }

          `$versionUrl = "`$releaseBaseUrl`version.json"

          Write-Host "Consultando a versão mais recente do Maximus Admin..."
          `$meta = Invoke-RestMethod -Uri `$versionUrl

          `$installerUrl = `$meta.installerUrl

          if ([string]::IsNullOrWhiteSpace(`$installerUrl)) {
            `$installerUrl = "`$releaseBaseUrl`$(`$meta.installer)"
          }

          `$installerPath = Join-Path `$env:TEMP `$meta.installer

          Write-Host "Baixando Maximus Admin `$(`$meta.version)..."
          Invoke-WebRequest -Uri `$installerUrl -OutFile `$installerPath

          Write-Host "Iniciando instalador..."
          Start-Process -FilePath `$installerPath -Wait
          "@

          Set-Content -Path (Join-Path $publishDir "install.ps1") -Value $installScript -Encoding UTF8

          Write-Host "Arquivos preparados em $publishDir"
          Get-ChildItem $publishDir | Select-Object Name, Length

      - name: Upload GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: maximus-admin-windows
          path: windows-release/*
          if-no-files-found: error
          retention-days: 30

      - name: Deploy to Hostinger
        if: ${{ env.HOSTINGER_HOST != '' && env.HOSTINGER_USER != '' && env.HOSTINGER_SSH_KEY != '' && env.HOSTINGER_REMOTE_PATH != '' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace($env:HOSTINGER_PORT)) {
            $env:HOSTINGER_PORT = "22"
          }

          $sshDir = Join-Path $env:USERPROFILE ".ssh"
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null

          $keyPath = Join-Path $sshDir "hostinger_key"
          $env:HOSTINGER_SSH_KEY | Out-File -FilePath $keyPath -Encoding ascii

          icacls $keyPath /inheritance:r | Out-Null
          icacls $keyPath /grant:r "$($env:USERNAME):(R)" | Out-Null

          $remote = "$($env:HOSTINGER_USER)@$($env:HOSTINGER_HOST)"
          $remotePath = $env:HOSTINGER_REMOTE_PATH
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "windows-release"

          ssh -i $keyPath -p $env:HOSTINGER_PORT -o StrictHostKeyChecking=no $remote "mkdir -p '$remotePath'"

          Get-ChildItem $publishDir | ForEach-Object {
            scp -i $keyPath -P $env:HOSTINGER_PORT -o StrictHostKeyChecking=no $_.FullName "$remote:$remotePath"
          }

          Write-Host "Release Windows enviada para Hostinger: $remotePath"
